<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#090D14"/>
    </linearGradient>
    <linearGradient id="eventGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#3E3E3E"/>
    </linearGradient>
    <linearGradient id="validateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E6B59"/>
      <stop offset="100%" stop-color="#0B5B4D"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#473B9E"/>
      <stop offset="100%" stop-color="#3E348A"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B528C"/>
      <stop offset="100%" stop-color="#18497C"/>
    </linearGradient>
    <linearGradient id="sinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A48"/>
      <stop offset="100%" stop-color="#424240"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11" stroke="#9CA3AF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>

  <!-- Top event -->
  <g filter="url(#softShadow)">
    <rect x="440" y="48" width="520" height="84" rx="18" fill="url(#eventGrad)" stroke="#8D8D8D"/>
    <text x="700" y="96" text-anchor="middle" fill="#F3F4F6" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">GitHub pull request event</text>
  </g>

  <!-- Validate -->
  <g filter="url(#softShadow)">
    <rect x="360" y="198" width="680" height="108" rx="18" fill="url(#validateGrad)" stroke="#33D1B1"/>
    <text x="700" y="248" text-anchor="middle" fill="#ECFDF5" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Validate &amp; queue</text>
    <text x="700" y="283" text-anchor="middle" fill="#A7F3D0" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif">HMAC-SHA256 signature check • async job queue</text>
  </g>

  <!-- Agent container -->
  <g filter="url(#shadow)">
    <rect x="92" y="382" width="1216" height="380" rx="24" fill="url(#agentGrad)" stroke="#A79BFA"/>
    <text x="700" y="442" text-anchor="middle" fill="#F5F3FF" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Review agent</text>
  </g>

  <!-- Step boxes -->
  <g filter="url(#softShadow)">
    <rect x="130" y="456" width="248" height="256" rx="16" fill="url(#stepGrad)" stroke="#7DD3FC"/>
    <rect x="432" y="456" width="248" height="256" rx="16" fill="url(#stepGrad)" stroke="#7DD3FC"/>
    <rect x="734" y="456" width="248" height="256" rx="16" fill="url(#stepGrad)" stroke="#7DD3FC"/>
    <rect x="1036" y="456" width="248" height="256" rx="16" fill="url(#stepGrad)" stroke="#7DD3FC"/>
  </g>

  <!-- Step text -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="254" y="548" fill="#DBEAFE" font-size="28" font-weight="700">Fetch diff</text>
    <text x="254" y="588" fill="#BFDBFE" font-size="21">
      <tspan x="254" dy="0">raw unified</tspan>
      <tspan x="254" dy="30">diff from</tspan>
      <tspan x="254" dy="30">GitHub API</tspan>
    </text>

    <text x="556" y="548" fill="#DBEAFE" font-size="28" font-weight="700">RAG lookup</text>
    <text x="556" y="588" fill="#BFDBFE" font-size="21">
      <tspan x="556" dy="0">query vector</tspan>
      <tspan x="556" dy="30">DB for</tspan>
      <tspan x="556" dy="30">code context</tspan>
    </text>

    <text x="858" y="548" fill="#DBEAFE" font-size="28" font-weight="700">Analyze</text>
    <text x="858" y="588" fill="#BFDBFE" font-size="21">
      <tspan x="858" dy="0">LLM reasons</tspan>
      <tspan x="858" dy="30">over diff +</tspan>
      <tspan x="858" dy="30">codebase context</tspan>
    </text>

    <text x="1160" y="548" fill="#DBEAFE" font-size="28" font-weight="700">Post review</text>
    <text x="1160" y="588" fill="#BFDBFE" font-size="21">
      <tspan x="1160" dy="0">structured</tspan>
      <tspan x="1160" dy="30">review back</tspan>
      <tspan x="1160" dy="30">to GitHub</tspan>
    </text>
  </g>

  <!-- Bottom sinks -->
  <g filter="url(#softShadow)">
    <rect x="92" y="812" width="604" height="112" rx="18" fill="url(#sinkGrad)" stroke="#A3A3A3"/>
    <rect x="744" y="812" width="564" height="112" rx="18" fill="url(#sinkGrad)" stroke="#A3A3A3"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="394" y="866" fill="#F5F5F4" font-size="28" font-weight="700">Codebase index</text>
    <text x="394" y="905" fill="#D6D3D1" font-size="21">AST-chunked • embedded • stored in pgvector</text>

    <text x="1026" y="866" fill="#F5F5F4" font-size="28" font-weight="700">GitHub</text>
    <text x="1026" y="905" fill="#D6D3D1" font-size="21">PR review posted as a comment</text>
  </g>

  <!-- Arrows -->
  <g stroke="#9CA3AF" stroke-width="4" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M700 132 L700 198"/>
    <path d="M700 306 L700 382"/>
    <path d="M378 584 L432 584"/>
    <path d="M680 584 L734 584"/>
    <path d="M982 584 L1036 584"/>
    <path d="M394 762 L394 812"/>
    <path d="M1008 762 L1008 812"/>
  </g>

  <!-- Footer -->
  <text x="700" y="964" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">Built on push to default branch • one provider switch (Ollama / Azure) • no code changes needed</text>
</svg>
